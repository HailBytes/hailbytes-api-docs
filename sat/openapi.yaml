  # ── SAML 2.0 SSO (unauthenticated — browser-facing) ────────────────────────
  /sso/saml/metadata:
    get:
      operationId: getSAMLMetadata
      tags: [SSO]
      summary: SAML SP metadata
      description: |
        Returns the SAML 2.0 Service Provider (SP) metadata document as XML.
        Provide this URL to your Identity Provider (IdP) when configuring the
        HailBytes SAT SP trust entry.

        This endpoint is unauthenticated and does not require an API key.
      security: []
      responses:
        '200':
          description: SP metadata XML
          content:
            application/xml:
              schema:
                type: string
                example: '<EntityDescriptor xmlns="urn:oasis:names:tc:SAML:2.0:metadata" ...>'
        '404':
          description: SAML SSO is not configured

  /sso/saml/login:
    get:
      operationId: initiateSAMLLogin
      tags: [SSO]
      summary: Initiate SAML SP-initiated SSO
      description: |
        Redirects the browser to the configured IdP with a signed AuthnRequest.
        The optional `next` query parameter specifies the path to redirect to
        after successful authentication.

        This endpoint is unauthenticated.
      security: []
      parameters:
        - name: next
          in: query
          required: false
          description: Path to redirect to after login (must be a relative path)
          schema:
            type: string
            example: /campaigns
      responses:
        '302':
          description: Redirect to IdP login page
        '404':
          description: SAML SSO is not configured

  /sso/saml/acs:
    post:
      operationId: samlAssertionConsumer
      tags: [SSO]
      summary: SAML Assertion Consumer Service
      description: |
        Receives the signed SAMLResponse POST from the IdP. Validates the
        assertion, JIT-provisions the user if configured, issues a session
        cookie, and redirects to the dashboard (or the `next` path stored
        during `/sso/saml/login`).

        This endpoint is called by the IdP browser redirect, not directly
        by API clients.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [SAMLResponse]
              properties:
                SAMLResponse:
                  type: string
                  description: Base64-encoded, signed SAML Response XML from the IdP
                RelayState:
                  type: string
                  description: Opaque relay state passed through the IdP (optional)
      responses:
        '302':
          description: Authentication successful — redirecting to dashboard
        '400':
          description: Missing or malformed SAMLResponse
        '403':
          description: SAML response failed validation
        '404':
          description: SAML SSO is not configured

  # ── Webhook payload schema (8.6) ────────────────────────────────────────────
  /webhooks/:
    get:
      operationId: listWebhooks
      tags: [Webhooks]
      summary: List webhooks
      description: Returns all configured outbound webhooks.
      responses:
        '200':
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhook'
    post:
      operationId: createWebhook
      tags: [Webhooks]
      summary: Create webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookInput'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'

      description: Creates a new outbound webhook subscription.
  /webhooks/{id}:
    get:
      operationId: getWebhook
      tags: [Webhooks]
      summary: Get webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric ID of the webhook subscription.
      responses:
        '200':
          description: Webhook object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
      description: Returns a single webhook subscription by ID.
    put:
      operationId: updateWebhook
      tags: [Webhooks]
      summary: Update webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric ID of the webhook subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookInput'
      responses:
        '200':
          description: Updated webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
      description: Updates an existing webhook subscription.
    delete:
      operationId: deleteWebhook
      tags: [Webhooks]
      summary: Delete webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric ID of the webhook subscription.
      responses:
        '200':
          description: Webhook deleted

      description: Deletes the webhook subscription. In-flight deliveries are not cancelled.
  /webhooks/{id}/deliveries:
    get:
      operationId: listWebhookDeliveries
      tags: [Webhooks]
      summary: List delivery history for a webhook
      description: Returns the last 100 delivery attempts for the specified webhook.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric ID of the webhook subscription.
      responses:
        '200':
          description: Delivery history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookDelivery'

  /webhooks/{id}/deliveries/{delivery_id}/replay:
    post:
      operationId: replayWebhookDelivery
      tags: [Webhooks]
      summary: Replay a webhook delivery
      description: Re-sends the payload from a previous delivery attempt.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric ID of the webhook subscription.
        - name: delivery_id
          in: path
          required: true
          schema:
            type: integer
          description: Numeric ID of the historical delivery to replay.
      responses:
        '200':
          description: Replay queued

